name: 飞书定时与事件同步

on:
  schedule:
    - cron: '0 18 * * *'       # 1. 定时：每天北京时间凌晨2点同步一次[cite: 1, 4]
  workflow_dispatch:            # 2. 手工：支持在 GitHub Actions 页面点击按钮手动调试[cite: 1, 4]
  repository_dispatch:          # 3. 飞书添加记录：跨平台实时响应触发
    types: [feishu_record_added]

# 显式声明该工作流拥有对仓库的写入权限[cite: 1, 4]
permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取当前仓库代码
        uses: actions/checkout@v3[cite: 1, 4]
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v4[cite: 1, 4]
        with:
          python-version: '3.10'[cite: 1, 4]
      
      - name: 安装依赖
        run: pip install requests[cite: 1, 4]
      
      - name: 执行同步脚本
        run: python sync_feishu.py  # 👈 已成功修改为 sync_feishu.py[cite: 1]
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}[cite: 1, 4]
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}[cite: 1, 4]
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN }}[cite: 1, 4]
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}[cite: 1, 4]
      
      - name: 将下载好的新资料和清单提交回仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"[cite: 1, 4]
          git config --local user.name "github-actions[bot]"[cite: 1, 4]
          git add -A[cite: 1, 4]
          
          # 没有变更则安全跳过，防止因无更新空提交报错终止
          git diff --quiet && git diff --staged --quiet || git commit -m "数据自动同步更新 [skip ci]"[cite: 1, 4]
          
          # 动态匹配当前用户及仓库，顺畅推送
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}[cite: 1, 4]
